apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus.fullname" . }}-config
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
data:
  config.yaml: |
    gateway:
      address: ":9000"
      admin_address: ":9001"
      tls:
        enabled: {{ .Values.gateway.tls.enabled }}
    storage:
      backend: "{{ .Values.storage.backend }}"
      local:
        data_dir: "/var/lib/nexus/data"
    metadata:
      backend: "{{ .Values.metadata.backend }}"
      path: "/var/lib/nexus/metadata/metadata.db"
      raft:
        enabled: {{ .Values.metadata.raft.enabled }}
    services:
      encrypt:
        address: "encrypt-service:50051"
      decrypt:
        address: "decrypt-service:50052"
      keygen:
        address: "keygen-service:50053"
      keystore:
        address: "keystore-service:50054"
      keyunwrap:
        address: "keyunwrap-service:50055"
      token:
        address: "token-service:50056"
      sts:
        address: "sts-service:50057"
    observability:
      metrics:
        enabled: {{ .Values.observability.metrics.enabled }}
      tracing:
        enabled: {{ .Values.observability.tracing.enabled }}
        {{- if .Values.observability.tracing.enabled }}
        endpoint: "{{ .Values.observability.tracing.endpoint }}"
        {{- end }}
      logging:
        level: "{{ .Values.observability.logging.level }}"
