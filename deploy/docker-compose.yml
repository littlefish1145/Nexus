version: "3.8"

# Production deployment docker-compose for Nexus Object Storage
# Usage: docker compose -f deploy/docker-compose.yml up -d

x-nexus-common: &nexus-common
  image: nexus:latest
  restart: unless-stopped
  networks:
    - nexus-net

services:
  nexus:
    <<: *nexus-common
    ports:
      - "${NEXUS_PORT:-9000}:9000"
      - "${NEXUS_ADMIN_PORT:-9001}:9001"
      - "${NEXUS_METRICS_PORT:-9091}:9091"
    environment:
      NEXUS_CONFIG: /etc/nexus/config.yaml
      NEXUS_GATEWAY_ADDRESS: ":9000"
      NEXUS_GATEWAY_ADMIN_ADDRESS: ":9001"
      NEXUS_GATEWAY_ACCESS_KEY: "${NEXUS_ACCESS_KEY:-nexus}"
      NEXUS_GATEWAY_SECRET_KEY: "${NEXUS_SECRET_KEY:-nexus-secret}"
      NEXUS_STORAGE_BACKEND: "local"
      NEXUS_STORAGE_LOCAL_DATA_DIR: "/var/lib/nexus/data"
      NEXUS_METADATA_BACKEND: "boltdb"
      NEXUS_METADATA_PATH: "/var/lib/nexus/metadata/metadata.db"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
      NEXUS_OBSERVABILITY_METRICS_ENABLED: "true"
      NEXUS_SERVICES_ENCRYPT_ADDRESS: "encrypt-service:50051"
      NEXUS_SERVICES_DECRYPT_ADDRESS: "decrypt-service:50052"
      NEXUS_SERVICES_KEYGEN_ADDRESS: "keygen-service:50053"
      NEXUS_SERVICES_KEYSTORE_ADDRESS: "keystore-service:50054"
      NEXUS_SERVICES_KEYUNWRAP_ADDRESS: "keyunwrap-service:50055"
      NEXUS_SERVICES_TOKEN_ADDRESS: "token-service:50056"
      NEXUS_SERVICES_STS_ADDRESS: "sts-service:50057"
    volumes:
      - nexus-data:/var/lib/nexus/data
      - nexus-metadata:/var/lib/nexus/metadata
      - ./config.yaml:/etc/nexus/config.yaml:ro
    depends_on:
      encrypt-service:
        condition: service_healthy
      decrypt-service:
        condition: service_healthy
      keygen-service:
        condition: service_healthy
      keystore-service:
        condition: service_healthy
      keyunwrap-service:
        condition: service_healthy
      token-service:
        condition: service_healthy
      sts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  encrypt-service:
    <<: *nexus-common
    command: ["/usr/local/bin/encrypt-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50051"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  decrypt-service:
    <<: *nexus-common
    command: ["/usr/local/bin/decrypt-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50052"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50052"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  keygen-service:
    <<: *nexus-common
    command: ["/usr/local/bin/keygen-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50053"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50053"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  keystore-service:
    <<: *nexus-common
    command: ["/usr/local/bin/keystore-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50054"
      NEXUS_KEYSTORE_PATH: "/var/lib/nexus/keystore/keystore.db"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    volumes:
      - nexus-keystore:/var/lib/nexus/keystore
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50054"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  keyunwrap-service:
    <<: *nexus-common
    command: ["/usr/local/bin/keyunwrap-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50055"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50055"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  token-service:
    <<: *nexus-common
    command: ["/usr/local/bin/token-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50056"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50056"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  sts-service:
    <<: *nexus-common
    command: ["/usr/local/bin/sts-service"]
    environment:
      NEXUS_SERVICE_ADDRESS: ":50057"
      NEXUS_OBSERVABILITY_LOGGING_LEVEL: "${NEXUS_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50057"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  nexus-data:
    driver: local
  nexus-metadata:
    driver: local
  nexus-keystore:
    driver: local

networks:
  nexus-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
