syntax = "proto3";

package nexus.common;

option go_package = "nexus/proto/common";

// Token types for delegation
enum TokenType {
  TOKEN_TYPE_WRITE = 0;
  TOKEN_TYPE_READ = 1;
  TOKEN_TYPE_DELETE = 2;
}

// Delegation token signed by TokenService
message DelegationToken {
  string token_id = 1;
  TokenType token_type = 2;
  string user_id = 3;
  string bucket = 4;
  string object_key = 5;
  int64 expiry = 6;  // Unix timestamp
  int64 created_at = 7;  // Unix timestamp
  repeated string operations = 8;
  string content_hash = 9;
  bytes signature = 10;
}

// Encrypted DEK structure
message EncryptedDEK {
  bytes encrypted_key = 1;
  string algorithm = 2;
  string key_id = 3;
  int32 key_version = 4;
}

// ECDH public key for key exchange
message ECDHPublicKey {
  bytes public_key = 1;  // X9.62 uncompressed point format
  string curve = 2;  // e.g., "P-256"
}

// ECDH encrypted DEK (encrypted with derived shared secret)
message ECDHEncryptedDEK {
  bytes ciphertext = 1;  // AES-256-GCM encrypted DEK
  bytes nonce = 2;  // GCM nonce
  bytes ephemeral_public_key = 3;  // Service's ephemeral ECDH public key
}

// Service metadata for registration
message ServiceMetadata {
  string service_name = 1;
  string service_id = 2;
  string address = 3;
  int32 port = 4;
  repeated string tags = 5;
  int64 registered_at = 6;
  string version = 7;
}

// Health check status
message HealthStatus {
  string service_id = 1;
  bool healthy = 2;
  string message = 3;
  int64 checked_at = 4;
}

// Error response
message Error {
  int32 code = 1;
  string message = 2;
  string details = 3;
}