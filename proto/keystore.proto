syntax = "proto3";

package nexus.keystore;

option go_package = "nexus/proto/keystore";

import "common.proto";

// KeyStoreService - Stores encrypted DEKs
// No encryption keys - only stores encrypted DEKs
// Uses independent file storage for persistence

service KeyStoreService {
  // Store an encrypted DEK
  rpc StoreKey(StoreKeyRequest) returns (StoreKeyResponse);
  
  // Retrieve an encrypted DEK
  rpc GetKey(GetKeyRequest) returns (GetKeyResponse);
  
  // Delete an encrypted DEK
  rpc DeleteKey(DeleteKeyRequest) returns (DeleteKeyResponse);
  
  // List keys for a bucket
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);
  
  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);
}

message StoreKeyRequest {
  string bucket = 1;
  string object_key = 2;
  nexus.common.EncryptedDEK encrypted_dek = 3;
  string key_id = 4;  // Optional, auto-generated if empty
  
  // Metadata for the key entry
  int64 created_at = 5;
  string algorithm = 6;
  int64 object_size = 7;  // Original object size for reference
}

message StoreKeyResponse {
  string key_id = 1;
  int64 stored_at = 2;
  nexus.common.Error error = 3;
}

message GetKeyRequest {
  string bucket = 1;
  string object_key = 2;
  string key_id = 3;  // Optional, if empty returns latest version
}

message GetKeyResponse {
  nexus.common.EncryptedDEK encrypted_dek = 1;
  string key_id = 2;
  int64 created_at = 3;
  string algorithm = 4;
  nexus.common.Error error = 5;
}

message DeleteKeyRequest {
  string bucket = 1;
  string object_key = 2;
  string key_id = 3;  // Optional, if empty deletes all versions
}

message DeleteKeyResponse {
  bool deleted = 1;
  int32 deleted_count = 2;  // Number of versions deleted
  nexus.common.Error error = 3;
}

message ListKeysRequest {
  string bucket = 1;
  string prefix = 2;  // Object key prefix filter
  int32 limit = 3;
  int32 offset = 4;
}

message ListKeysResponse {
  repeated KeyEntry keys = 1;
  int32 total_count = 2;
  nexus.common.Error error = 3;
}

message KeyEntry {
  string object_key = 1;
  string key_id = 2;
  int64 created_at = 3;
  string algorithm = 4;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string service_name = 2;
  string version = 3;
  int64 uptime_seconds = 4;
  int64 total_keys_stored = 5;  // Statistics
}